name: Naming Conventions — Reporting

on:
  push:
    branches-ignore:
      - main
      - develop
  pull_request:
    branches:
      - develop

env:
  VALID_BRANCH_PATTERN: '^reporting/(feature|fix|chore|docs|test|refactor)/[a-z0-9]+(-[a-z0-9]+)*$'
  VALID_COMMIT_PATTERN: '^\[reporting\] (feat|fix|chore|docs|test|refactor)\([a-z-]+\): .+'
  BOT_PATTERN: '\[bot\]'
  MERGE_PATTERN: '^Merge '

jobs:
  check-branch-name:
    name: Check Branch Name
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          echo "Branch: $BRANCH"

          if echo "$BRANCH" | grep -qE "$VALID_BRANCH_PATTERN"; then
            echo "✅ Branch name is valid"
            exit 0
          fi

          echo "❌ Invalid branch name: '$BRANCH'"
          echo "   Expected : reporting/type/short-description"
          echo "   Valid types: feature, fix, chore, docs, test, refactor"
          echo "   Examples :"
          echo "     reporting/feature/event-log-consumer"
          echo "     reporting/fix/blocked-order-null"
          echo "     reporting/chore/update-contracts"
          exit 1

  check-commit-messages:
    name: Check Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve commit range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=-1" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate commit messages
        run: |
          FAILED=0

          is_bot_commit()    { echo "$1" | grep -qE "$BOT_PATTERN"; }
          is_merge_commit()  { echo "$1" | grep -qE "$MERGE_PATTERN"; }
          is_valid_message() { echo "$1" | grep -qE "$VALID_COMMIT_PATTERN"; }

          validate_commit() {
            local AUTHOR="$1"
            local MSG="$2"

            if is_bot_commit "$AUTHOR"; then
              echo "✅ Skipping bot commit   : '$MSG'"
              return 0
            fi

            if is_merge_commit "$MSG"; then
              echo "✅ Skipping merge commit : '$MSG'"
              return 0
            fi

            if ! is_valid_message "$MSG"; then
              echo "❌ Invalid commit message: '$MSG'"
              echo "   Expected : [reporting] type(scope): description"
              echo "   Valid types : feat, fix, chore, docs, test, refactor"
              echo "   Valid scopes: eventlog, blockedorder, projection, consumer, config"
              echo "   Examples :"
              echo "     [reporting] feat(eventlog): add EventLogId value object"
              echo "     [reporting] fix(blockedorder): fix null pointer on blocked order"
              echo "     [reporting] test(consumer): add unit tests for production consumer"
              return 1
            fi

            echo "✅ Valid: '$MSG'"
          }

          while IFS="|" read -r AUTHOR MSG; do
            [ -z "$MSG" ] && continue
            validate_commit "$AUTHOR" "$MSG" || FAILED=1
          done <<< "$(git log --format="%an|%s" "${{ steps.range.outputs.value }}")"

          if [ "$FAILED" = "1" ]; then
            echo "❌ Some commits do not follow the naming convention"
            exit 1
          fi

          echo "✅ All commits are valid"

  check-coverage:
    name: Check Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests and verify 100% coverage
        run: mvn verify -Djacoco.haltOnFailure=true